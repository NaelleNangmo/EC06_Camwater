; ── PHP production settings ───────────────────────────────────────────────
upload_max_filesize = 20M
post_max_size = 25M
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; Sécurité
expose_php = Off
display_errors = Off
log_errors = On
error_log = /var/www/html/storage/logs/php_errors.log

; Sessions
session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax
