name: CD — Build & Push Docker

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        default: "production"
        type: choice
        options: [production, staging]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/camwaterapp

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — Build & Push vers GitHub Container Registry
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push image Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable={{is_default_branch}}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — Déploiement (SSH vers serveur)
  # Décommenter et configurer les secrets GitHub pour activer
  # ────────────────────────────────────────────────────────────────────────────
  # deploy:
  #   name: Déploiement en production
  #   runs-on: ubuntu-latest
  #   needs: build-and-push
  #   environment: production
  #
  #   steps:
  #     - name: Déployer via SSH
  #       uses: appleboy/ssh-action@v1
  #       with:
  #         host: ${{ secrets.DEPLOY_HOST }}
  #         username: ${{ secrets.DEPLOY_USER }}
  #         key: ${{ secrets.DEPLOY_SSH_KEY }}
  #         script: |
  #           cd /opt/camwaterapp
  #           docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
  #           docker compose up -d --no-build
  #           docker compose exec app php artisan migrate --force
  #           docker image prune -f

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — Notification de déploiement
  # ────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()

    steps:
      - name: Résumé du déploiement
        run: |
          echo "## Résultat CD" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branche** : ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image** : ${{ needs.build-and-push.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Statut** : ${{ needs.build-and-push.result }}" >> $GITHUB_STEP_SUMMARY
