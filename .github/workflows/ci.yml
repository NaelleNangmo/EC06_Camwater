name: CI — Tests & Qualité

on:
  push:
    branches: [develop, "feature/**", "fix/**", "bugfix/**", "hotfix/**"]
  pull_request:
    branches: [develop, main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 — PHPUnit (Feature + Unit)
  # ────────────────────────────────────────────────────────────────────────────
  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_sqlite, pdo_mysql, mbstring, xml, bcmath, pcntl, tokenizer, ctype, json
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=ext-mongodb

      - name: Préparer l'environnement de test
        run: cp .env.testing .env

      - name: Exécuter PHPUnit
        run: php artisan test

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — atoum (tests unitaires purs)
  # ────────────────────────────────────────────────────────────────────────────
  atoum:
    name: atoum Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_sqlite, mbstring, xml, bcmath, pcntl, tokenizer, ctype, json
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=ext-mongodb

      - name: Préparer l'environnement de test
        run: cp .env.testing .env

      - name: Exécuter atoum
        run: |
          php vendor/atoum/atoum/bin/atoum \
            -bf tests/Atoum/bootstrap.php \
            -f tests/Atoum/FactureTest.php \
            -f tests/Atoum/AbonneTest.php \
            -ulr -mcn 1

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — SimpleTest (tests unitaires)
  # ────────────────────────────────────────────────────────────────────────────
  simpletest:
    name: SimpleTest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_sqlite, mbstring, xml, bcmath, tokenizer, ctype, json
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=ext-mongodb

      - name: Préparer l'environnement de test
        run: cp .env.testing .env

      - name: Exécuter SimpleTest — Facture
        run: php tests/SimpleTest/FactureSimpleTest.php

      - name: Exécuter SimpleTest — Abonne
        run: php tests/SimpleTest/AbonneSimpleTest.php

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 — Lint (Laravel Pint)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist --ignore-platform-req=ext-mongodb

      - name: Vérifier le style de code
        run: ./vendor/bin/pint --test

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5 — SonarCloud (analyse qualité)
  # ────────────────────────────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [phpunit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=NaelleNangmo_kaba-delivery-backend
            -Dsonar.organization=naellenangmo
            -Dsonar.sources=.
            -Dsonar.tests=tests
            -Dsonar.sourceEncoding=UTF-8

  # ────────────────────────────────────────────────────────────────────────────
  # Job 6 — Build Docker (vérification uniquement sur CI)
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [phpunit, atoum, simpletest, lint, sonar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: camwaterapp:ci-${{ github.sha }}
